<ion-content>
  <div class="login-container">

    <div class="brand">
      <span class="mascot">🦕</span>
      <h1 class="app-name">Critaceous</h1>
    </div>

    <div class="form">
      <ion-item>
        <ion-label position="floating">Email</ion-label>
        <ion-input type="email" [(ngModel)]="email" />
      </ion-item>

      <ion-item>
        <ion-label position="floating">Password</ion-label>
        <ion-input type="password" [(ngModel)]="password" />
      </ion-item>

      <ion-button expand="block" (click)="onLogin()">
        Log In
      </ion-button>

      <ion-button expand="block" fill="clear" (click)="goToRegister()">
        Don't have an account? Register
      </ion-button>
    </div>

  </div>
</ion-content>
